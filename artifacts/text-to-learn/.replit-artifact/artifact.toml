kind = "web"
previewPath = "/"
title = "Text to Learn"
version = "1.0.0"
id = "artifacts/text-to-learn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25521
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/text-to-learn run dev"

[services.env]
PORT = "25521"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/text-to-learn", "run", "build"]
publicDir = "artifacts/text-to-learn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
